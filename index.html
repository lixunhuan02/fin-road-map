};
const STORE_KEY = 'tradingMap';
function loadStore() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      return {
        completed: new Set(d.completed || []),
        theme: d.theme || 'dark',
        fontSize: d.fontSize || 'medium',
        activeAsset: d.activeAsset || 'stocks',
        view: d.view || 'cards'
      };
    }
  } catch(e) {}
  return { completed: new Set(), theme:'dark', fontSize:'medium', activeAsset:'stocks', view:'cards' };
}

function saveStore() {
  const obj = {
    completed: [...store.completed],
    theme: store.theme,
    fontSize: store.fontSize,
    activeAsset: store.activeAsset,
    view: store.view
  };
  try { localStorage.setItem(STORE_KEY, JSON.stringify(obj)); } catch(e) {}
}

const store = loadStore();

// ================================================================
// DOM引用
// ================================================================
const $ = id => document.getElementById(id);
const assetTabs = $('assetTabs');
const contentContainer = $('contentContainer');
const contentArea = $('contentArea');
const settingsBtn = $('settingsBtn');
const settingsOverlay = $('settingsOverlay');
const settingsDrawer = $('settingsDrawer');
const settingsClose = $('settingsClose');
const themeGroup = $('themeGroup');
const fontGroup = $('fontGroup');
const resetProgressOnly = $('resetProgressOnly');
const resetAll = $('resetAll');

// ================================================================
// 核心函数
// ================================================================
function getAllModuleIds(assetKey) {
  const ids = [];
  const asset = knowledgeData[assetKey];
  if (!asset) return ids;
  Object.keys(asset.dimensions).forEach(dk => {
    const dim = asset.dimensions[dk];
    if (dim) {
      dim.modules.forEach(m => ids.push(m.id));
    }
  });
  return ids;
}

function getAllModuleIdsAll() {
  let ids = [];
  ASSET_KEYS.forEach(ak => {
    ids = ids.concat(getAllModuleIds(ak));
  });
  return ids;
}

function calcProgress(assetKey) {
  const ids = getAllModuleIds(assetKey);
  if (!ids.length) return 0;
  const done = ids.filter(id => store.completed.has(id)).length;
  return Math.round(done / ids.length * 100);
}

function calcGlobalProgress() {
  const all = getAllModuleIdsAll();
  if (!all.length) return 0;
  const done = all.filter(id => store.completed.has(id)).length;
  return Math.round(done / all.length * 100);
}

function toggleComplete(moduleId) {
  if (store.completed.has(moduleId)) {
    store.completed.delete(moduleId);
  } else {
    store.completed.add(moduleId);
  }
  saveStore();
  renderAll();
}

// ================================================================
// 卡片渲染 & 二级页面
// ================================================================
function renderCards() {
  const ak = store.activeAsset;
  const asset = knowledgeData[ak];
  if (!asset) { contentContainer.innerHTML = ''; return; }

  let html = `<div class="welcome-cards">
    <div class="wc-title">${ASSET_NAMES[ak]}</div>
  </div>`;
  // 使用资产的实际维度键（兼容不同资产的维度结构）
  const dimKeys = Object.keys(asset.dimensions);
  dimKeys.forEach(dk => {
    const dim = asset.dimensions[dk];
    if (!dim || !dim.modules.length) return;
    html += `<div class="dim-header">${dim.name}</div>`;
    dim.modules.forEach(m => {
      const checked = store.completed.has(m.id) ? 'checked' : '';
      html += `<div class="module-card" data-module="${m.id}">
        <span class="card-cb ${checked}" data-cb="${m.id}">✓</span>
        <div class="card-body">
          <div class="card-title">${m.title}</div>
          <div class="card-meta"><span class="dim-tag ${dk}">${dim.name}</span></div>
        </div>
        <span class="card-arrow">›</span>
      </div>`;
    });
  });
  contentContainer.innerHTML = html;
}

function updateSidebarPct() {
  const pct = calcProgress(store.activeAsset);
  // 进度信息在底部状态栏显示，无需单独更新
}

function selectModule(moduleId) {
  let dimName = '', moduleTitle = '';
  for (const ak of ASSET_KEYS) {
    const asset = knowledgeData[ak];
    if (!asset) continue;
    for (const dk of Object.keys(asset.dimensions)) {
      const dim = asset.dimensions[dk];
      if (!dim) continue;
      for (const m of dim.modules) {
        if (m.id === moduleId) { dimName = dim.name; moduleTitle = m.title; break; }
      }
      if (dimName) break;
    }
    if (dimName) break;
  }

  store.view = 'detail';
  saveStore();
  renderContent(moduleId, dimName, moduleTitle);
}

function renderContent(moduleId, dimName, moduleTitle) {
  if (!moduleId) {
    contentContainer.innerHTML = `<div class="content-card s1" style="text-align:center;padding:40px 20px">
      <div style="font-size:2.5rem;margin-bottom:12px">📚</div>
      <div style="font-size:1rem;color:var(--text-primary);font-weight:600;margin-bottom:8px">欢迎进入交易专家知识地图</div>
      <div style="font-size:0.85rem;color:var(--text-muted);line-height:1.6">请从侧边栏选择一个知识点开始学习</div>
    </div>`;
    updateContentAreaClass(false);
    return;
  }

  // 从数据中查找对应模块
  let found = null;
  for (const ak of ASSET_KEYS) {
    const asset = knowledgeData[ak];
    if (!asset) continue;
    for (const dk of Object.keys(asset.dimensions)) {
      const dim = asset.dimensions[dk];
      if (!dim) continue;
      for (const m of dim.modules) {
        if (m.id === moduleId) { found = m; break; }
      }
      if (found) break;
    }
    if (found) break;
  }

  // 显示返回栏
  const backBar = $('contentBackBar');
  const backTitle = $('backBarTitle');
  backBar.classList.add('show');
  backTitle.textContent = moduleTitle || found?.title || '';

  if (found) {
    contentContainer.innerHTML = found.content;
    updateContentAreaClass(true);
  } else {
    contentContainer.innerHTML = `<div class="content-card s1" style="text-align:center;padding:40px 20px">
      <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
      <div style="font-size:0.9rem;color:var(--text-muted)">未找到该知识点</div>
    </div>`;
    updateContentAreaClass(false);
  }

  // 回到顶部按钮
  const scrollBtn = $('scrollTopBtn');
  scrollBtn.classList.add('show');

  // 更新底部进度
  updateBottomBar();
  updateGlobalProgress();
}

function showCardsView() {
  store.view = 'cards';
  saveStore();
  $('contentBackBar').classList.remove('show');
  $('scrollTopBtn').classList.remove('show');
  contentArea.classList.remove('no-module');
  renderCards();
}

function updateContentAreaClass(hasModule) {
  contentArea.classList.toggle('no-module', !hasModule);
}

// ================================================================
// 资产切换
// ================================================================
function switchAsset(assetKey) {
  if (store.activeAsset === assetKey) return;
  store.activeAsset = assetKey;
  saveStore();
  renderAll();
}

// ================================================================
// 渲染全部
// ================================================================
function renderAll() {
  // 更新tab
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.asset === store.activeAsset);
  });

  // 更新底部
  updateBottomBar();

  // 更新全局进度
  updateGlobalProgress();

  // 渲染卡片或内容
  if (store.view === 'detail') {
    store.view = 'cards';
    saveStore();
  }
  $('contentBackBar').classList.remove('show');
  $('scrollTopBtn')?.classList.remove('show');
  renderCards();
}

// ================================================================
// UI 更新辅助
// ================================================================
function updateBottomBar() {
  const ak = store.activeAsset;
  const globalPct = calcGlobalProgress();
  const assetPct = calcProgress(ak);
  $('bottomGlobalPct').textContent = globalPct + '%';
  $('bottomAssetLabel').textContent = ASSET_NAMES[ak] || ak;
  $('bottomAssetPct').textContent = assetPct + '%';
  $('globalProgressFill').style.width = globalPct + '%';
}

function updateGlobalProgress() {
  const pct = calcGlobalProgress();
  $('globalProgressFill').style.width = pct + '%';
}

// 设置面板控制
// ================================================================
function openSettings() {
  settingsDrawer.classList.add('open');
  settingsOverlay.classList.add('open');
  updateSettingsProgress();
}

function closeSettings() {
  settingsDrawer.classList.remove('open');
  settingsOverlay.classList.remove('open');
}

function updateSettingsProgress() {
  $('stgGlobal').textContent = calcGlobalProgress() + '%';
  ASSET_KEYS.forEach(ak => {
    const el = $('stg' + ak.charAt(0).toUpperCase() + ak.slice(1));
    if (el) el.textContent = calcProgress(ak) + '%';
  });
}

// ================================================================
// 主题 & 字体
// ================================================================
function setTheme(theme) {
  store.theme = theme;
  saveStore();
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelector('[name="theme-color"]').content = theme === 'dark' ? '#0b1120' : '#f8fafc';
  document.querySelectorAll('#themeGroup .opt-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === theme);
  });
}

function setFontSize(font) {
  store.fontSize = font;
  saveStore();
  document.documentElement.setAttribute('data-font', font);
  document.querySelectorAll('#fontGroup .opt-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.font === font);
  });
}

// ================================================================
// 重置
// ================================================================
function handleResetProgress() {
  if (!confirm('确认重置所有学习进度？此操作不可撤销。')) return;
  store.completed = new Set();
  saveStore();
  renderAll();
  updateSettingsProgress();
}

function resetAllSettings() {
  if (!confirm('确认重置全部设置（学习进度+主题+字体）？此操作不可撤销。')) return;
  store.completed = new Set();
  store.theme = 'dark';
  store.fontSize = 'medium';
  saveStore();
  setTheme('dark');
  setFontSize('medium');
  renderAll();
  updateSettingsProgress();
}

// ================================================================
// 事件绑定
// ================================================================

// 资产切换
assetTabs.addEventListener('click', e => {
  const tab = e.target.closest('.nav-tab');
  if (tab && tab.dataset.asset) {
    switchAsset(tab.dataset.asset);
  }
});

// 设置面板
settingsBtn.addEventListener('click', openSettings);
document.addEventListener('click', e => {
  // 卡片复选框点击
  const cb = e.target.closest('.card-cb');
  if (cb && cb.dataset.cb) {
    e.stopPropagation();
    toggleComplete(cb.dataset.cb);
    return;
  }
  // 卡片点击 → 选择模块
  const card = e.target.closest('.module-card');
  if (card && card.dataset.module) {
    e.stopPropagation();
    selectModule(card.dataset.module);
    return;
  }
  // 返回按钮点击
  const backBtn = e.target.closest('#backBtn');
  if (backBtn) {
    e.stopPropagation();
    showCardsView();
    return;
  }
  // 回到顶部按钮点击
  const scrollBtn = e.target.closest('#scrollTopBtn');
  if (scrollBtn) {
    e.stopPropagation();
    contentArea.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
});

// 设置面板
settingsBtn.addEventListener('click', openSettings);
settingsOverlay.addEventListener('click', closeSettings);
settingsClose.addEventListener('click', closeSettings);

// 主题切换
themeGroup.addEventListener('click', e => {
  const btn = e.target.closest('.opt-btn');
  if (btn && btn.dataset.theme) {
    setTheme(btn.dataset.theme);
  }
});

// 字体切换
fontGroup.addEventListener('click', e => {
  const btn = e.target.closest('.opt-btn');
  if (btn && btn.dataset.font) {
    setFontSize(btn.dataset.font);
  }
});

// 重置
resetProgressOnly.addEventListener('click', handleResetProgress);
resetAll.addEventListener('click', resetAllSettings);

// ================================================================
// PWA 注册
// ================================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(err => {
      console.log('SW registration failed:', err);
    });
  });
}

// ================================================================
// 启动
// ================================================================
// 初始化主题和字体
setTheme(store.theme);
setFontSize(store.fontSize);

// 完整渲染
renderAll();

// 设置面板进度更新
document.querySelector('.settings-overlay')?.addEventListener('transitionend', () => {
  if (settingsOverlay.classList.contains('open')) updateSettingsProgress();
});
</script>
</body>
</html>
