<h3 class="section-title"><span class="num">①</span> 核心名词完整释义</h3>

<h4 class="subsection-title">1.1 供需平衡表（Supply-Demand Balance Sheet）</h4>
<p><strong class="hl-principle">供需平衡表</strong>是将某一商品的全球或区域的总供给和总需求列出，计算供需缺口（过剩/紧缺）的表格。它是大宗商品基本面分析最核心的工具。</p>
<div class="table-wrap"><table>
<tr><th>项目</th><th>2023年（万吨）</th><th>2024E（万吨）</th><th>YoY变化</th></tr>
<tr><td>总供给</td><td>5,000</td><td>5,200</td><td>+4%</td></tr>
<tr><td>  - 矿山产量</td><td>4,500</td><td>4,600</td><td>+2.2%</td></tr>
<tr><td>  - 回收/再生</td><td>500</td><td>600</td><td>+20%</td></tr>
<tr><td>总需求</td><td>5,100</td><td>5,300</td><td>+3.9%</td></tr>
<tr><td>供需缺口</td><td>-100（紧缺）</td><td>-100（紧缺）</td><td>—</td></tr>
<tr><td>库存变动</td><td>-100（去库）</td><td>-100（去库）</td><td>—</td></tr>
</table></div>

<h4 class="subsection-title">1.2 数据来源渠道</h4>
<div class="table-wrap"><table>
<tr><th>品种</th><th>权威供需数据提供方</th><th>更新频率</th><th>获取渠道</th></tr>
<tr><td>原油</td><td>OPEC月报/MOPR、IEA月报、EIA周度库存</td><td>月/周</td><td>OPEC官网/iea.org/eia.gov</td></tr>
<tr><td>铜</td><td>ICSG（国际铜研究组）、SMM（上海有色网）</td><td>月度</td><td>icsg.org/smm.cn</td></tr>
<tr><td>铁矿石</td><td>Mysteel、中钢协、四大矿山季报</td><td>周/季</td><td>Mysteel.com</td></tr>

<h4 class="subsection-title">1.3 库存周期四阶段详解</h4>
<div class="flow-chart">
  <div class="flow-node blue">被动去库存 <br/>需求↑库存↓</div>
  <div class="flow-arrow">→</div>

<h3 class="section-title"><span class="num">②</span> 重点品种供给评估</h3>

<h4 class="subsection-title">2.1 原油供给分析框架</h4>
<p><strong class="hl-bold">OPEC+决策机制：</strong>OPEC（13个成员国）+ 非OPEC（以俄罗斯为首的10个产油国）= OPEC+。每年举行两次部长级会议决定产量政策。减产决定需要所有成员国"一致同意"（实际上由沙特主导）。</p>
<p><strong class="hl-bold">EIA周度库存数据：</strong>美国能源信息署每周三10:30发布美国原油库存变动。库存增加>市场预期→利空；库存减少>预期→利多。这是全球交易量最大、最及时的商品数据。</p>
<p><strong class="hl-bold">美国页岩油：</strong>2010年后美国页岩油革命使美国成为全球最大产油国（2023年产量约1290万桶/日，超过沙特和俄罗斯）。页岩油的"快周期"（从钻井到出油约3-6个月）使原油供给调节能力大幅增强，降低了OPEC的影响力。</p>

<h4 class="subsection-title">2.2 铜供给分析框架</h4>
<p>铜矿从勘探到投产的周期通常为7-10年。供给刚性极强——即使价格大涨，短期内也无法增加产量。因此铜价对需求变化（尤其是中国需求，占全球55%）极度敏感。2023-2025年铜矿产能释放高峰过后，市场预期将进入"供给收缩期"。</p>

<h3 class="section-title"><span class="num">③</span> 实战交易规则</h3>
<div class="rule-card">
<div class="rule-title">📋 供需分析实盘操作流程</div>
<ul>
<li><span class="hl-signal">供需缺口交易：</span>连续3个月供需缺口>总供给的2% → 确认趋势方向。缺口扩大→趋势加强</li>
<li><span class="hl-signal">库存周期定位：</span>主动去库存末期（库存增速从高位回落3个月+）+ 价格企稳→做多窗口</li>
<li><span class="hl-signal">EIA数据交易：</span>EIA库存数据公布后，若与市场预期相差超过200万桶，5分钟内价格波幅约1-2%。可用于短线交易</li>
<li><span class="hl-signal">OPEC会议交易：</span>OPEC减产前3个月原油通常提前上涨（计入预期）。减产落地当日若"预期兑现"则利好出尽</li>
<li><strong>关键数据日历：</strong>USDA月度供需报告（每月9-12日）、EIA原油库存（每周三）、OPEC月报（每月中）、国内Mysteel周报</li>
</ul>
</div>

<h3 class="section-title"><span class="num">④</span> 实战复盘案例</h3>
<p><strong class="hl-bold">案例：2022年2-6月原油170%涨幅</strong></p>
<p><strong class="hl-bold">供需面：</strong>2022年初全球原油库存处于5年低位（OECD商业库存低于5年均值约1.5亿桶）。需求从疫情中强劲复苏（全球油需2022年预计9960万桶/日，接近2019年水平）。供给端OPEC+持续减产约200万桶/日。供需缺口持续存在。</p>
<p><strong class="hl-bold">地缘冲击：</strong>2022年2月24日俄乌冲突爆发。俄罗斯原油日均出口约480万桶，约占全球5%。市场担忧制裁导致俄罗斯供给退出，WTI从90美元/桶暴涨至130.5美元/桶（3月8日）。</p>
<p><strong class="hl-bold">启示：</strong>供需缺口（基本面）+地缘冲击（情绪面）的双重驱动力可使价格在短期内超出任何基本面估值。6月8日WTI触及122美元后，美国宣布释放战略石油储备（SPR，每日100万桶、持续6个月），供给端对冲落地，油价开始回落。</p>

</ul>
</div>

content:`<div class="content-card s1">

<h3 class="section-title"><span class="num">【本节核心学习重点】</span></h3>
<div class="core-points">
<div class="cp-title">📌 必掌握</div>
<ul>

<li><span class="tag must">必学</span> 商品季节性规律的统计方法：计算各月历史价格的"最大概率方向"</li>

<li><span class="tag understand">了解</span> 各主要品种的季节性价格规律（农产品/能源/金属的差异）</li>
<li><span class="tag understand">了解</span> 布林带在趋势行情中与CTA策略（管理期货基金）的联动</li>
</ul>
</div>
<div class="core-points">
<div class="cp-title">⚠ 核心避坑</div>
<ul>
<li>季节性规律是"统计规律"不是"确定规律"——极端宏观环境可完全压制季节性（如2020年疫情）</li>
<li>农产品比工业品季节性更强，能源品居中，金属最弱</li>
<li>供需分析对商品的优先度高于技术分析：极端供需失衡时任何技术指标都失效</li>

<h3 class="section-title"><span class="num">①</span> 核心名词完整释义</h3>

<h4 class="subsection-title">1.1 商品季节性规律</h4>
<p><strong class="hl-principle">季节性规律（Seasonality）</strong>指商品价格在不同月份呈现的统计规律性。原因：农产品受种植/收获周期影响（6-10月收获季供给大增、价格承压）；能源受取暖/驾驶旺季影响（冬季取暖油需求↑）；天气模式的周期性（厄尔尼诺的降雨模式）。</p>
<div class="table-wrap"><table>
<tr><th>品种</th><th>最强势月份</th><th>最弱势月份</th><th>主要季节性因素</th></tr>
<tr><td>原油（WTI）</td><td>2-4月（驾驶旺季前补库）</td><td>10-11月（需求淡季）</td><td>美国驾驶旺季（5-9月）提前补库；飓风季（8-10月）</td></tr>
<tr><td>大豆</td><td>5-6月（种植期天气炒作）</td><td>9-11月（南美收获）</td><td>北半球种植期/生长期的天气不确定性</td></tr>
<tr><td>铜</td><td>1-3月（中国节后补库）</td><td>6-8月（夏季需求淡季）</td><td>中国基建/制造业的季节性</td></tr>
<tr><td>天然气</td><td>11-1月（冬季取暖需求）</td><td>4-5月（冬季结束，库存回补期）</td><td>北半球冬季温度变化</td></tr>
</table></div>

<h4 class="subsection-title">1.2 CCI（Commodity Channel Index）</h4>
<p><strong class="hl-principle">商品通道指数（CCI）</strong>由Donald Lambert在1980年提出，用于衡量当前价格相对于统计平均价格的偏离程度。它不仅适用于商品，也适用于股票/外汇。</p>
<p>公式：<span class="hl-formula">CCI = (TP - SMA(TP)) / (0.015 × Mean Deviation)</span>，其中TP = (最高+最低+收盘)/3</p>
<div class="table-wrap"><table>
<tr><th>CCI值</th><th>含义</th><th>商品市场操作</th></tr>
<tr><td>&gt;+200</td><td>极度超买，可能是顶部</td><td>分批止盈多单</td></tr>
<tr><td>+100至+200</td><td>超买区间</td><td>多单持有，不加仓</td></tr>

        theme: d.theme || 'dark',
        fontSize: d.fontSize || 'medium',
        activeAsset: d.activeAsset || 'stocks',

  } catch(e) {}

  return Math.round(done / ids.length * 100);
}

}

function updateSettingsProgress() {
  $('stgGlobal').textContent = calcGlobalProgress() + '%';
  ASSET_KEYS.forEach(ak => {
    const el = $('stg' + ak.charAt(0).toUpperCase() + ak.slice(1));
    if (el) el.textContent = calcProgress(ak) + '%';
  });
}

// ================================================================
// 主题 & 字体
// ================================================================
function setTheme(theme) {
  store.theme = theme;
  saveStore();
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelector('[name="theme-color"]').content = theme === 'dark' ? '#0b1120' : '#f8fafc';
  document.querySelectorAll('#themeGroup .opt-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === theme);
  });
}

function setFontSize(font) {
  store.fontSize = font;
  saveStore();
  document.documentElement.setAttribute('data-font', font);
  document.querySelectorAll('#fontGroup .opt-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.font === font);
  });
}

// ================================================================
// 重置
// ================================================================
function handleResetProgress() {
  if (!confirm('确认重置所有学习进度？此操作不可撤销。')) return;
  store.completed = new Set();
  saveStore();
  renderAll();
  updateSettingsProgress();
}

function resetAllSettings() {
  if (!confirm('确认重置全部设置（学习进度+主题+字体）？此操作不可撤销。')) return;
  store.completed = new Set();
  store.theme = 'dark';
  store.fontSize = 'medium';
  saveStore();
  setTheme('dark');
  setFontSize('medium');
  renderAll();
  updateSettingsProgress();
}

// ================================================================
// 事件绑定
// ================================================================

// 资产切换
assetTabs.addEventListener('click', e => {
  const tab = e.target.closest('.nav-tab');
  if (tab && tab.dataset.asset) {
    switchAsset(tab.dataset.asset);
  }
});

// 侧边栏
menuBtn.addEventListener('click', openSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
sidebarClose.addEventListener('click', closeSidebar);

// 目录树点击事件（全局委托，避免元素绑定问题）
document.addEventListener('click', e => {
  // 只处理 sidebar 内部点击
  const sidebar = document.getElementById('sidebar');
  if (!sidebar.contains(e.target)) return;
  
  // 复选框点击（优先级最高）
  const cb = e.target.closest('.tree-cb');
  if (cb && cb.dataset.cb) {
    e.stopPropagation();
    toggleComplete(cb.dataset.cb);
    return;
  }
  
  // 模块点击 → 选择模块
  const item = e.target.closest('.tree-hd[data-module]');
  if (item) {
    e.stopPropagation();
    selectModule(item.dataset.module);
    return;
  }
  
  // 维度折叠展开
  const dim = e.target.closest('.tree-hd.lv1');
  if (dim) {
    const child = dim.nextElementSibling;
    if (child) {
      child.classList.toggle('open');
      dim.querySelector('.tree-arrow')?.classList.toggle('open');
    }
  }
});

// 设置面板
settingsBtn.addEventListener('click', openSettings);
settingsOverlay.addEventListener('click', closeSettings);
settingsClose.addEventListener('click', closeSettings);

// 主题切换
themeGroup.addEventListener('click', e => {
  const btn = e.target.closest('.opt-btn');
  if (btn && btn.dataset.theme) {
    setTheme(btn.dataset.theme);
  }
});

// 字体切换
fontGroup.addEventListener('click', e => {
  const btn = e.target.closest('.opt-btn');
  if (btn && btn.dataset.font) {
    setFontSize(btn.dataset.font);
  }
});

// 重置
resetProgressOnly.addEventListener('click', handleResetProgress);
resetAll.addEventListener('click', resetAllSettings);

// 菜单按钮（左上角打开目录）
document.querySelector('.nav-logo')?.addEventListener('click', openSidebar);

// ================================================================
// PWA 注册
// ================================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(err => {
      console.log('SW registration failed:', err);
    });
  });
}

// ================================================================
// 启动
// ================================================================
// 初始化主题和字体
setTheme(store.theme);
setFontSize(store.fontSize);

// 完整渲染
renderAll();

// 设置面板进度更新
document.querySelector('.settings-overlay')?.addEventListener('transitionend', () => {
  if (settingsOverlay.classList.contains('open')) updateSettingsProgress();
});
</script>
</body>
</html>
