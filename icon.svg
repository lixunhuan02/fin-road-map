<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1120"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 背景网格装饰 -->
  <g stroke="#1e293b" stroke-width="0.8" opacity="0.4">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- K线图主体 -->
  <g transform="translate(256,260)">
    <!-- 第1根K线(阳) -->
    <line x1="-140" y1="20" x2="-140" y2="-40" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <rect x="-150" y="-20" width="20" height="40" rx="2" fill="#22c55e"/>
    <line x1="-140" y1="-40" x2="-140" y2="-55" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <!-- 第2根K线(阴) -->
    <line x1="-70" y1="10" x2="-70" y2="-30" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <rect x="-80" y="-30" width="20" height="40" rx="2" fill="#ef4444"/>
    <line x1="-70" y1="10" x2="-70" y2="25" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <!-- 第3根K线(阳) -->
    <line x1="0" y1="30" x2="0" y2="-50" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <rect x="-10" y="-30" width="20" height="60" rx="2" fill="#22c55e"/>
    <line x1="0" y1="-50" x2="0" y2="-65" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <!-- 第4根K线(阳) -->
    <line x1="70" y1="25" x2="70" y2="-45" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <rect x="60" y="-25" width="20" height="50" rx="2" fill="#22c55e"/>
    <line x1="70" y1="-45" x2="70" y2="-60" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <!-- 第5根K线(阴) -->
    <line x1="140" y1="15" x2="140" y2="-15" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <rect x="130" y="-15" width="20" height="30" rx="2" fill="#ef4444"/>
    <line x1="140" y1="15" x2="140" y2="35" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <!-- 上升趋势线 -->
    <line x1="-160" y1="50" x2="160" y2="-70" stroke="url(#goldGrad)" stroke-width="3" stroke-dasharray="8,4" opacity="0.6"/>
  </g>
  <!-- 放大镜图标 - 右上 -->
  <g transform="translate(396, 96)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
    <line x1="20" y1="20" x2="38" y2="38" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- 底部文字装饰线 -->
  <line x1="256" y1="440" x2="256" y2="476" stroke="url(#goldGrad)" stroke-width="2" opacity="0.4"/>
</svg>
